[build]
  command = "npm run build"
  publish = "dist"

[dev]
  command = "npm run dev"
  targetPort = 8080
  port = 8888

# WordPress/WooCommerce proxy is now handled by Edge Function: netlify/edge-functions/wordpress-proxy.ts
# This proxies /wp-json/*, /wp-admin/*, /checkout/* to the WordPress backend at Pressable (199.16.172.188)


[[redirects]]
  from = "/sasong"
  to = "/säsong"
  status = 301

[[redirects]]
  from = "/kundtjanst"
  to = "/kundservice"
  status = 301

[[redirects]]
  from = "/checkout"
  to = "/kassa"
  status = 301

[build.environment]
  NODE_VERSION = "18"
  SECRETS_SCAN_OMIT_KEYS = "VITE_FIREBASE_API_KEY"
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

# SPA fallback - MUST be last! Catches all routes not matched above.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
