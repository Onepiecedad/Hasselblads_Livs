[build]
  command = "npm run build"
  publish = "dist"

[dev]
  command = "npm run dev"
  targetPort = 8080
  port = 8888

# WordPress admin – redirect directly to WordPress at Pressable
[[redirects]]
  from = "/wp-login.php"
  to = "https://hasselbladslivs.se/wp-login.php"
  status = 301
  force = true

[[redirects]]
  from = "/wp-admin/*"
  to = "https://hasselbladslivs.se/wp-admin/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/wp-json/*"
  to = "https://hasselbladslivs.se/wp-json/:splat"
  status = 301
  force = true

# WooCommerce checkout - proxy to WordPress (kept for checkout flow)
[[redirects]]
  from = "/kassa"
  to = "/.netlify/functions/wordpress-proxy/kassa"
  status = 200
  force = true

[[redirects]]
  from = "/kassa/*"
  to = "/.netlify/functions/wordpress-proxy/kassa/:splat"
  status = 200
  force = true

# WooCommerce AJAX endpoints
[[redirects]]
  from = "/wc-ajax/*"
  to = "/.netlify/functions/wordpress-proxy/wc-ajax/:splat"
  status = 200
  force = true

# WooCommerce cart operations - proxy add-to-cart to WordPress homepage first
[[redirects]]
  from = "/wc-add-to-cart"
  to = "/.netlify/functions/wordpress-proxy/"
  status = 200
  force = true
  query = {add-to-cart = ":product_id"}


[[redirects]]
  from = "/sasong"
  to = "/säsong"
  status = 301

[[redirects]]
  from = "/kundtjanst"
  to = "/kundservice"
  status = 301

[[redirects]]
  from = "/checkout"
  to = "/kassa"
  status = 301

[build.environment]
  NODE_VERSION = "18"
  SECRETS_SCAN_OMIT_KEYS = "VITE_FIREBASE_API_KEY"
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

# SPA fallback - MUST be last! Catches all routes not matched above.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
