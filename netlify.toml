[build]
  command = "npm run build"
  publish = "dist"

[dev]
  command = "npm run dev"
  targetPort = 8080
  port = 8888

# WordPress/WooCommerce proxy is handled by Serverless Function: netlify/functions/wordpress-proxy.ts
# This proxies /wp-json/*, /wp-admin/* to the WordPress backend at Pressable (199.16.172.188)

# Proxy WordPress API to serverless function
[[redirects]]
  from = "/wp-json/*"
  to = "/.netlify/functions/wordpress-proxy/wp-json/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/wp-admin/*"
  to = "/.netlify/functions/wordpress-proxy/wp-admin/:splat"
  status = 200
  force = true


[[redirects]]
  from = "/sasong"
  to = "/säsong"
  status = 301

[[redirects]]
  from = "/kundtjanst"
  to = "/kundservice"
  status = 301

[[redirects]]
  from = "/checkout"
  to = "/kassa"
  status = 301

[build.environment]
  NODE_VERSION = "18"
  SECRETS_SCAN_OMIT_KEYS = "VITE_FIREBASE_API_KEY"
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

# SPA fallback - MUST be last! Catches all routes not matched above.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
