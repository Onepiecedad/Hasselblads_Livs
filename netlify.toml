# ── Security headers ───────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[build]
  command = "npm run build"
  publish = "dist"

[dev]
  command = "npm run dev"
  targetPort = 8080
  port = 8888

# WordPress admin – proxy through to WordPress backend at Pressable
[[redirects]]
  from = "/wp-login.php"
  to = "/.netlify/functions/wordpress-proxy/wp-login.php"
  status = 200
  force = true

[[redirects]]
  from = "/wp-admin/*"
  to = "/.netlify/functions/wordpress-proxy/wp-admin/:splat"
  status = 200
  force = true

# WordPress assets needed for admin & checkout styling
[[redirects]]
  from = "/wp-content/*"
  to = "/.netlify/functions/wordpress-proxy/wp-content/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/wp-includes/*"
  to = "/.netlify/functions/wordpress-proxy/wp-includes/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/wp-json/*"
  to = "/.netlify/functions/wordpress-proxy/wp-json/:splat"
  status = 200
  force = true

# WooCommerce checkout - proxy to WordPress (kept for checkout flow)
[[redirects]]
  from = "/kassa"
  to = "/.netlify/functions/wordpress-proxy/kassa"
  status = 200
  force = true

[[redirects]]
  from = "/kassa/*"
  to = "/.netlify/functions/wordpress-proxy/kassa/:splat"
  status = 200
  force = true

# WooCommerce AJAX endpoints
[[redirects]]
  from = "/wc-ajax/*"
  to = "/.netlify/functions/wordpress-proxy/wc-ajax/:splat"
  status = 200
  force = true

# WooCommerce cart operations - proxy add-to-cart to WordPress homepage first
[[redirects]]
  from = "/wc-add-to-cart"
  to = "/.netlify/functions/wordpress-proxy/"
  status = 200
  force = true
  query = {add-to-cart = ":product_id"}


[[redirects]]
  from = "/sasong"
  to = "/säsong"
  status = 301

[[redirects]]
  from = "/kundtjanst"
  to = "/kundservice"
  status = 301

[[redirects]]
  from = "/checkout"
  to = "/kassa"
  status = 301

[[redirects]]
  from = "/varukorg"
  to = "/webbutik"
  status = 301

[[redirects]]
  from = "/cart"
  to = "/webbutik"
  status = 301

[build.environment]
  NODE_VERSION = "18"
  SECRETS_SCAN_OMIT_KEYS = "VITE_FIREBASE_API_KEY"
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

# SPA fallback - MUST be last! Catches all routes not matched above.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
