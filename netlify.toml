[build]
  command = "npm run build"
  publish = "dist"

[dev]
  command = "npm run dev"
  targetPort = 8080
  port = 8888

[[redirects]]
  from = "/sasong"
  to = "/säsong"
  status = 301

[[redirects]]
  from = "/kundtjanst"
  to = "/kundservice"
  status = 301

[[redirects]]
  from = "/checkout"
  to = "/kassa"
  status = 301

[build.environment]
  NODE_VERSION = "18"
  SECRETS_SCAN_OMIT_KEYS = "VITE_FIREBASE_API_KEY"
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

[context.production]
  [[context.production.redirects]]
    from = "/*"
    to = "/index.html"
    status = 200
