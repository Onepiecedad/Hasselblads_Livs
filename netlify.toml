[build]
  command = "npm run build"
  publish = "dist"

[dev]
  command = "npm run dev"
  targetPort = 8080
  port = 8888

# WooCommerce API Proxy - Forwards requests to Pressable WordPress server
# This enables WooCommerce REST API and MCP access through Netlify
[[redirects]]
  from = "/wp-json/*"
  to = "https://199.16.172.188/wp-json/:splat"
  status = 200
  force = true
  headers = {Host = "hasselbladslivs.se", X-Forwarded-Host = "hasselbladslivs.se"}

# WooCommerce checkout redirect
[[redirects]]
  from = "/checkout/*"
  to = "https://199.16.172.188/checkout/:splat"
  status = 200
  force = true
  headers = {Host = "hasselbladslivs.se"}

# WordPress admin proxy (for legacy access)
[[redirects]]
  from = "/wp-admin/*"
  to = "https://199.16.172.188/wp-admin/:splat"
  status = 200
  force = true
  headers = {Host = "hasselbladslivs.se"}

[[redirects]]
  from = "/sasong"
  to = "/säsong"
  status = 301

[[redirects]]
  from = "/kundtjanst"
  to = "/kundservice"
  status = 301

[[redirects]]
  from = "/checkout"
  to = "/kassa"
  status = 301

[build.environment]
  NODE_VERSION = "18"
  SECRETS_SCAN_OMIT_KEYS = "VITE_FIREBASE_API_KEY"
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

[context.production]
  [[context.production.redirects]]
    from = "/*"
    to = "/index.html"
    status = 200
