<!DOCTYPE html>
<html>
<body>
<img id="img" src="src/assets/category-cards/alt1-final/category-farskvaror.webp" onload="getColor()">
<script>
function getColor() {
  const img = document.getElementById('img');
  const canvas = document.createElement('canvas');
  canvas.width = img.width;
  canvas.height = img.height;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0);
  const data = ctx.getImageData(0, 0, 1, 1).data;
  console.log('HEX:', '#' + [...data].slice(0,3).map(x => x.toString(16).padStart(2, '0')).join(''));
}
</script>
</body>
</html>
