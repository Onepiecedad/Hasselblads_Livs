<!DOCTYPE html>
<html>
<body>
<img id="img" src="src/assets/category-cards/alt1-final/category-farskvaror.png" onload="getColor()">
<script>
function getColor() {
  const img = document.getElementById('img');
  const canvas = document.createElement('canvas');
  canvas.width = img.width;
  canvas.height = img.height;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0);
  
  // Get color at top edge
  const topColor = ctx.getImageData(img.width / 2, 5, 1, 1).data;
  console.log('Top Edge HEX:', '#' + [...topColor].slice(0,3).map(x => x.toString(16).padStart(2, '0')).join(''));
  
  // Get color at left edge
  const leftColor = ctx.getImageData(5, img.height / 2, 1, 1).data;
  console.log('Left Edge HEX:', '#' + [...leftColor].slice(0,3).map(x => x.toString(16).padStart(2, '0')).join(''));
}
</script>
</body>
</html>
